name = "sub2api-cf"
main = "src/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "sub2api-cf"
database_id = "17c11d10-079d-4912-a2ca-de6c932a7dfc"

# 自定义域名（Cloudflare 自动建 DNS 并关联到本 Worker，无需手动 CNAME）
[[routes]]
pattern = "api.kailongliu0324.qzz.io"
custom_domain = true

# 密钥（不要用明文写在文件里，用 `wrangler secret put` 设置）：
#   ADMIN_TOKEN  —— 管理后台 / 管理 API 的访问令牌
# 设置命令见 README.md
